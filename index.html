<script>
// Registrar Service Worker para PWA
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    const swCode = `
      const CACHE='planilla-v1';
      self.addEventListener('install', e=> e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['./', './index.html']))));
      self.addEventListener('fetch', e=> e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('./index.html')))));
    `;
    const blob = new Blob([swCode], {type:'application/javascript'});
    const url = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).catch(()=>{});
  });
}

// Crear manifest dinámicamente para GitHub Pages
const manifest = {
  name: "Planilla Semanal",
  short_name: "Planilla",
  description: "Planilla semanal de sesiones",
  start_url: "./",
  display: "standalone",
  background_color: "#f1f5f9",
  theme_color: "#0f172a",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='100' fill='%230f172a'/><text y='340' x='80' font-size='320' font-family='sans-serif'>📋</text></svg>", sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
  ]
};
const manifestBlob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
const manifestUrl = URL.createObjectURL(manifestBlob);
document.addEventListener('DOMContentLoaded', ()=>{
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = manifestUrl;
  document.head.appendChild(link);
});
</script>

const DIAS_OFFSET = {lunes:0,martes:1,miercoles:2,jueves:3,viernes:4};
const DIAS_NOMBRE = {lunes:"Lunes",martes:"Martes",miercoles:"Miércoles",jueves:"Jueves",viernes:"Viernes"};
const DIAS_ORDEN = ["lunes","martes","miercoles","jueves","viernes"];

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function getLunes(str){ return new Date(str+"T12:00:00"); }
function semanaIdx(l){ return Math.round((l-REFERENCIA)/(7*86400000)); }
function resolverQ(key,idx){ const p=PARES[key]; return idx%2===0?p.A:p.B; }
function getMonto(p){ for(const k in MONTOS) if(k.toLowerCase()===p.toLowerCase()) return MONTOS[k]; return 55000; }
function getBoleta(p){ for(const k in BOLETAS) if(k.toLowerCase()===p.toLowerCase()) return BOLETAS[k]; return ""; }
function formatFecha(d){ return d.toLocaleDateString("es-CL",{day:"2-digit",month:"2-digit",year:"numeric"}); }
function formatCorta(d){ return d.toLocaleDateString("es-CL",{day:"2-digit",month:"2-digit"}); }
function getLunesActual(){
  const h=new Date(); const diff=h.getDay()===0?-6:1-h.getDay();
  const l=new Date(h); l.setDate(h.getDate()+diff); return l.toISOString().split("T")[0];
}
function generarSesiones(fechaStr){
  const lunes=getLunes(fechaStr); const idx=semanaIdx(lunes);
  return HORARIO_BASE.map((s,i)=>{
    const paciente=s.q?resolverQ(s.p,idx):s.p;
    const fecha=new Date(lunes); fecha.setDate(lunes.getDate()+DIAS_OFFSET[s.dia]);
    return {id:i,fecha:fecha.toISOString(),dia:s.dia,hora:s.hora,paciente,
      monto:getMonto(paciente),quincenal:s.q,estado:"Asistida",pago:"Pagado",
      boleta:getBoleta(paciente),obs:""};
  });
}

const STORAGE_KEY="planilla-semanas-v1";
const TEL_KEY="planilla-telefonos-v1";
function loadLS(k){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch{return null;} }
function saveLS(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} }

// ─── STATE ────────────────────────────────────────────────────────────────────
const state = {
  semanas: loadLS(STORAGE_KEY)||{},
  telefonos: loadLS(TEL_KEY)||{},
  semanaActual: getLunesActual(),
  diaActivo: DIAS_ORDEN[new Date().getDay()-1]||"lunes",
  vista: "planilla", // planilla | tsv | telefonos
  guardando: false,
  telEditando: null,
  telValor: "",
};

function getSesiones(){ return state.semanas[state.semanaActual]||[]; }

function cargarSemanaActual(){
  if(!state.semanas[state.semanaActual]){
    const nuevas=generarSesiones(state.semanaActual);
    state.semanas[state.semanaActual]=nuevas;
    saveLS(STORAGE_KEY,state.semanas);
  }
}

function updateSesion(id,campo,valor){
  const sesiones=getSesiones().map(s=>s.id===id?{...s,[campo]:valor}:s);
  state.semanas[state.semanaActual]=sesiones;
  saveLS(STORAGE_KEY,state.semanas);
  render();
}

function cambiarSemana(delta){
  const d=getLunes(state.semanaActual);
  d.setDate(d.getDate()+delta*7);
  state.semanaActual=d.toISOString().split("T")[0];
  state.diaActivo="lunes";
  cargarSemanaActual();
  render();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  cargarSemanaActual();
  const sesiones=getSesiones();
  const sesionesDia=sesiones.filter(s=>s.dia===state.diaActivo);
  const idx=semanaIdx(getLunes(state.semanaActual));
  const lunes=getLunes(state.semanaActual);
  const viernes=new Date(lunes); viernes.setDate(lunes.getDate()+4);

  // RESUMEN
  const asist=sesiones.filter(s=>s.estado==="Asistida").length;
  const noAsist=sesiones.filter(s=>s.estado==="No asistida").length;
  const reagend=sesiones.filter(s=>s.estado==="Reagendada").length;
  const pagado=sesiones.filter(s=>s.estado==="Asistida"&&s.pago==="Pagado").reduce((a,b)=>a+b.monto,0);
  const pendiente=sesiones.filter(s=>s.estado==="Asistida"&&s.pago==="Pendiente").reduce((a,b)=>a+b.monto,0);

  // QUINCENALES
  const qTags=Object.entries(PARES).map(([k,p])=>{
    const pac=idx%2===0?p.A:p.B;
    return `<span class="q-tag">${p.label}: <strong>${pac.split(" ")[0]}</strong></span>`;
  }).join("");

  // DÍAS TABS
  const diasTabs=DIAS_ORDEN.map(d=>{
    const ss=sesiones.filter(s=>s.dia===d);
    const a=ss.filter(s=>s.estado==="Asistida").length;
    const t=ss.length;
    const activeClass=state.vista==="planilla"&&state.diaActivo===d?"active":"";
    return `<button class="tab-btn ${activeClass}" onclick="setDia('${d}')">${DIAS_NOMBRE[d].slice(0,3)}${t>0?` <span style='opacity:.7;font-size:10px'>${a}/${t}</span>`:""}</button>`;
  }).join("")+
  `<button class="tab-btn ${state.vista==="tsv"?"active":""}" onclick="setVista('tsv')">Excel</button>`+
  `<button class="tab-btn ${state.vista==="telefonos"?"active":""}" onclick="setVista('telefonos')">WA</button>`;

  // SESSION CARDS
  let contentHTML="";

  if(state.vista==="planilla"){
    const cardClass=s=>s.estado==="Asistida"?"asistida":s.estado==="No asistida"?"no-asistida":"reagendada";
    const estadoBtn=(s,e)=>{
      let cls="";
      if(s.estado===e) cls=e==="Asistida"?"active-asistida":e==="No asistida"?"active-no":"active-reagendada";
      return `<button class="${cls}" onclick="updateSesion(${s.id},'estado','${e}')">${e}</button>`;
    };
    const pagoBtn=(s,p)=>{
      let cls="";
      if(s.pago===p) cls=p==="Pagado"?"active-pagado":p==="Pendiente"?"active-pendiente":"";
      return `<button class="${cls}" onclick="updateSesion(${s.id},'pago','${p}')">${p}</button>`;
    };

    const diaFecha=sesionesDia.length>0?formatFecha(new Date(sesionesDia[0].fecha)):"";

    contentHTML=`
      <div class="resumen">
        <div class="resumen-card"><div class="resumen-val" style="color:#22c55e">${asist}</div><div class="resumen-label">Asistidas</div></div>
        <div class="resumen-card"><div class="resumen-val" style="color:#ef4444">${noAsist}</div><div class="resumen-label">No asist.</div></div>
        <div class="resumen-card"><div class="resumen-val" style="color:#f59e0b">${reagend}</div><div class="resumen-label">Reagend.</div></div>
        <div class="resumen-card"><div class="resumen-val" style="color:#0ea5e9">$${Math.round(pagado/1000)}K</div><div class="resumen-label">Pagado</div></div>
        <div class="resumen-card"><div class="resumen-val" style="color:#f97316">$${Math.round(pendiente/1000)}K</div><div class="resumen-label">Pend.</div></div>
      </div>
      <div class="dia-title">${DIAS_NOMBRE[state.diaActivo]}${diaFecha?" — "+diaFecha:""}</div>
      ${sesionesDia.length===0?'<div class="empty">Sin sesiones este día</div>':
        sesionesDia.map(s=>`
          <div class="session-card ${cardClass(s)}">
            <div class="session-top">
              <div>
                <div class="session-nombre">${s.paciente}${s.quincenal?'<span class="badge-q">Q</span>':''}</div>
                <div class="session-meta">${s.hora}:00 &nbsp;·&nbsp; $${s.monto.toLocaleString("es-CL")}</div>
                ${s.boleta?`<div class="session-boleta">Boleta ${s.boleta}</div>`:""}
              </div>
              ${(()=>{const tel=state.telefonos[s.paciente]||""; return tel?`<a class="wa-btn" href="https://wa.me/56${tel.replace(/\D/g,"")}?text=${encodeURIComponent("Hola, nos vemos a las "+s.hora+":00!")}" target="_blank">WA</a>`:"";})()}
            </div>
            <div class="btn-group">
              ${estadoBtn(s,"Asistida")}${estadoBtn(s,"No asistida")}${estadoBtn(s,"Reagendada")}
            </div>
            <div class="btn-group">
              ${pagoBtn(s,"Pagado")}${pagoBtn(s,"Pendiente")}${pagoBtn(s,"—")}
            </div>
            <input class="obs-input" placeholder="Observaciones..." value="${s.obs.replace(/"/g,'&quot;')}"
              oninput="updateSesion(${s.id},'obs',this.value)" />
          </div>
        `).join("")}
    `;
  }

  if(state.vista==="tsv"){
    const tsv=["Fecha\tDía\tHora\tPaciente\tN° boleta\tMonto\tEstado\tPago\tObservaciones",
      ...sesiones.map(s=>{
        const f=new Date(s.fecha);
        return `${formatFecha(f)}\t${s.dia}\t${s.hora}\t${s.paciente}\t${s.boleta}\t${s.monto}\t${s.estado}\t${s.pago}\t${s.obs}`;
      })].join("\n");
    contentHTML=`
      <div class="section-title">Copiar para Excel</div>
      <div class="tsv-box" id="tsv-content">${tsv.replace(/&/g,"&amp;").replace(/</g,"&lt;")}</div>
      <button class="btn-primary" onclick="copiarTSV()">Copiar al portapapeles</button>
    `;
  }

  if(state.vista==="telefonos"){
    const todos=Array.from(new Set(
      HORARIO_BASE.filter(s=>!s.q).map(s=>s.p)
      .concat(Object.values(PARES).flatMap(p=>[p.A,p.B]))
    )).sort();
    contentHTML=`
      <div class="section-title">Teléfonos para WhatsApp</div>
      <div class="section-sub">Número sin código de país ni 9 inicial (ej: 98765432)</div>
      ${todos.map(pac=>{
        const tel=state.telefonos[pac]||"";
        const esEditando=state.telEditando===pac;
        return `<div class="tel-card">
          <div style="flex:1">
            <div class="tel-nombre">${pac}</div>
            ${esEditando?
              `<div class="tel-edit">
                <input id="tel-input" value="${state.telValor}" placeholder="98765432" oninput="state.telValor=this.value" />
                <button class="ok" onclick="guardarTel('${pac}')">✓</button>
                <button class="cancel" onclick="state.telEditando=null;render()">✕</button>
              </div>`:
              `<div class="${tel?"tel-num":"tel-vacio"}" onclick="editarTel('${pac}','${tel}')">${tel?"+56 "+tel:"Agregar número →"}</div>`
            }
          </div>
          ${tel&&!esEditando?`<a class="wa-btn" href="https://wa.me/56${tel}?text=${encodeURIComponent("Hola, nos vemos pronto!")}" target="_blank">WA</a>`:""}
        </div>`;
      }).join("")}
    `;
  }

  app.innerHTML=`
    <div class="header">
      <div class="header-top">
        <div>
          <div class="header-title">Planilla semanal</div>
          <div class="header-status">Datos guardados ✓</div>
        </div>
        <div class="semana-nav">
          <button onclick="cambiarSemana(-1)">‹</button>
          <div class="semana-fecha">${formatCorta(lunes)} – ${formatCorta(viernes)}</div>
          <button onclick="cambiarSemana(1)">›</button>
        </div>
      </div>
      <div class="dias-tabs">${diasTabs}</div>
    </div>
    <div class="content">
      ${state.vista==="planilla"?`
        <div class="q-banner">
          <div class="q-banner-title">Quincenales esta semana</div>
          <div class="q-tags">${qTags}</div>
        </div>`:""}
      ${contentHTML}
    </div>
  `;

  if(state.telEditando) setTimeout(()=>{ const i=document.getElementById("tel-input"); if(i) i.focus(); },50);
}

// ─── ACCIONES ─────────────────────────────────────────────────────────────────
window.setDia=function(d){ state.diaActivo=d; state.vista="planilla"; render(); };
window.setVista=function(v){ state.vista=v; render(); };
window.cambiarSemana=cambiarSemana;
window.updateSesion=updateSesion;
window.editarTel=function(pac,tel){ state.telEditando=pac; state.telValor=tel; render(); };
window.guardarTel=function(pac){
  state.telefonos[pac]=state.telValor;
  saveLS(TEL_KEY,state.telefonos);
  state.telEditando=null;
  render();
};
window.copiarTSV=function(){
  const el=document.getElementById("tsv-content");
  if(el) navigator.clipboard.writeText(el.innerText).then(()=>alert("¡Copiado!")).catch(()=>alert("Selecciona el texto y cópialo manualmente"));
};

// ─── INIT ─────────────────────────────────────────────────────────────────────
const diaHoy = new Date().getDay();
if(diaHoy>=1&&diaHoy<=5) state.diaActivo=DIAS_ORDEN[diaHoy-1];
render();
</script>
</body>
</html>
